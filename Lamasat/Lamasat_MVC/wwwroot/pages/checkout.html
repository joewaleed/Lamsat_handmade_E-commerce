<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Lamsat</title>
    <link rel="stylesheet" href="/style/style-checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">Lams<span>a</span>t</a>
        <a href="jewelry.html" class="back-link"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </nav>

    <div class="checkout-container">
        <div class="cart-section">
            <h2><i class="fas fa-shopping-cart"></i> Shopping Cart</h2>
            <div id="cartItemsList"></div>
        </div>

        <div class="checkout-section">
            <h2><i class="fas fa-credit-card"></i> Checkout</h2>
            
            <h3 style="margin-bottom: 15px;">Delivery Address</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Street Address</label>
                <input type="text" id="address" placeholder="Enter your address">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" placeholder="City">
            </div>
            <div class="form-group">
                <label>Postal Code</label>
                <input type="text" id="postalCode" placeholder="Postal code">
            </div>

            <h3 style="margin-bottom: 15px;">Payment Method</h3>
            <div class="payment-methods">
                <label class="payment-method">
                    <input type="radio" name="payment" value="card" checked> Credit / Debit Card
                </label>
                <label class="payment-method">
                    <input type="radio" name="payment" value="cod"> Cash on Delivery
                </label>
            </div>

            <div class="order-summary">
                <h3 style="margin-bottom: 15px;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">EGP 0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>EGP 0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="summaryTotal">EGP 0</span>
                </div>
            </div>

            <button class="btn-place-order" onclick="placeOrder()"><i class="fas fa-check-circle"></i> Place Order</button>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Lamsat Egyptian Crafts. All rights reserved.</p>
    </footer>

    <div id="toastContainer"></div>

<script src="/js/js-checkout.js"></script>
</body>
</html>
